version: '3.8'
services:
  db:
    image: mariadb:10.8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: gtps_db
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5

  gtps:
    build: .
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: your_password
      DB_NAME: gtps_db
    depends_on:
      db:
        condition: service_healthy

